[config]
# Basic configuration for Qodo Merge
model="anthropic/claude-3-7-sonnet-20250219"
fallback_models=["anthropic/claude-sonnet-4-20250514"]
git_provider = "github"
use_repo_settings_file = true

[pr_reviewer]
# Enable automatic PR reviews
auto_review = true
require_score_review = false
require_tests_review = true
require_security_review = true
require_focused_review = true

# Review settings
num_code_suggestions = 6
inline_code_comments = true
persistent_comment_style = true

[pr_code_suggestions]
# Enable code suggestions
auto_improve = true
num_code_suggestions = 4
rank_suggestions = true

[pr_description]
# Auto-generate PR descriptions
auto_describe = true
include_generated_by_header = true

[github]
# GitHub specific settings
publish_review_comments = true
incremental_review = true
skip_draft = false

[pr_similar_issue]
# Find similar issues
skip_comments = false

[pr_add_docs]
# Documentation suggestions
auto_add_docs = true

[pr_update_changelog]
# Changelog updates
auto_update_changelog = false
